# Render deployment config untuk Backend Express.js
# File ini dideteksi otomatis oleh Render

services:
  - type: web
    name: socengkop-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node src/app.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
